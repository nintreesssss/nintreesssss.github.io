<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ with .Site.Params.siteTitle }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}</title>
  <link rel="stylesheet" href="/css/styles.css">
  {{ block "head" . }}{{ end }}
</head>
<body>
  {{ block "main" . }}{{ end }}

  <script>window.SiteParams = {{ .Site.Params | jsonify }};</script>
  <script src="/js/main.js"></script>
  {{ block "foot" . }}{{ end }}
</body>
</html>
