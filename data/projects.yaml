 # Projects data template
 #
 # Copy one item block below to add a new project.
 # Required fields:
 # - title: project name
 # - date: display date
 # - images: one or more image objects
 # Optional fields:
 # - link: clickable title URL
 # - description: short summary shown under the title
 # - techLines: list of tech-stack lines, rendered with <br>
 # - imagesClass: extra class for the whole image row, e.g. "project-images-row"
 # - image fields:
 #   - src: image path
 #   - alt: image alt text
 #   - class: image size preset class, or leave empty
 #   - width: optional precise width, e.g. "110%" or "560px"
 #   - maxWidth: optional max-width, e.g. "none" or "640px"

